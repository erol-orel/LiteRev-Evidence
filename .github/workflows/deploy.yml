name: CI / Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Build & checks
    runs-on: ubuntu-latest
    services:
      # Plain Postgres for the integration tests (they use a minimal schema, no
      # pgvector needed). The suite auto-skips DB tests if this is unreachable.
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Python syntax check (backend)
        run: python -m compileall -q *.py

      - name: Validate requirements.txt is resolvable
        run: pip install --dry-run -r requirements.txt

      - name: Backend tests (pytest)
        env:
          # main.py imports the heavy ML libs lazily, so the tests only need the
          # import-critical subset (keeps this step fast). Integration tests run
          # against the Postgres service above; pure-logic tests need no DB.
          DB_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
          WRITE_API_KEY: test-write-key
          OPENAI_API_KEY: ""
        run: |
          pip install pytest fastapi pydantic "sqlalchemy>=2.0" python-dotenv python-multipart "psycopg[binary]"
          pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    name: Deploy to production
    if: github.event_name != 'pull_request'
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH (runs deploy.sh on the server)
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              -i ~/.ssh/deploy_key \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              'cd /opt/literev-api && git reset --hard HEAD && bash deploy.sh'

      - name: Smoke test (health + corpus stats)
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              -i ~/.ssh/deploy_key \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              bash << 'EOF'
            set -e
            curl -fsS http://localhost:8000/health | grep -q '"status":"ok"'
            # DB + app OK : GET qui interroge la base. Remplace l'ancien POST /search
            # (endpoint retiré). -f fait échouer le smoke test sur tout statut != 2xx.
            curl -fsS http://localhost:8000/corpus/fulltext-stats >/dev/null
            echo "Smoke test passed"
          EOF
